$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: fair-ml-cyber-open-set-if-seed7
experiment_name: fair-ml-cyber
description: IsolationForest open-set baseline for unknown-family holdouts, seed 7.
code: ..
command: >-
  python -m pip install --upgrade pip &&
  python -m pip install -r requirements.txt &&
  python -m pip install -e . --no-deps &&
  python -m fair_ml_cyber.cli run-open-set-baselines
  --csv-dir ${{inputs.csv_dir}}
  --work-dir ${{outputs.work_dir}}
  --seed 7
  --models isolation_forest
  --feature-tiers deployment_safe
  --unknown-families Web,Botnet,PortScan,DDoS
  --result-prefix open_set_if_s7
inputs:
  csv_dir:
    type: uri_folder
    path: azureml:fair_ml_cyber_csvs:1
outputs:
  work_dir:
    type: uri_folder
compute: azureml:cpu-memory-cluster
environment: azureml:fair-ml-cyber-runtime-env:1
resources:
  instance_count: 1
